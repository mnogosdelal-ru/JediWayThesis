<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Результаты исследования</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    
    <section class="page active">
        <h1>Результаты исследования</h1>
        
        <div id="results-container"></div>
        
        <div class="card">
            <p>Вы можете обновить эту страницу, чтобы увидеть актуальную статистику.</p>
        </div>
    </section>

</div>

<script>
const apiCall = async (action, additionalData = {}) => {
    // Сначала пробуем получить из URL параметра, потом из localStorage
    let session_id = new URLSearchParams(window.location.search).get('session');
    if (!session_id) {
        session_id = localStorage.getItem('survey_session_id');
    }
    
    // Сохраняем в localStorage для последующих запросов
    if (session_id) {
        localStorage.setItem('survey_session_id', session_id);
    }
    
    const payload = { action, session_id, data: additionalData };
    try {
        const res = await fetch('api.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        return await res.json();
    } catch(e) {
        console.error("API call failed:", e);
        return { success: false };
    }
};

async function loadResults() {
    const resultsContainer = document.getElementById('results-container');
    if (!resultsContainer) return;
    
    resultsContainer.innerHTML = '<p style="text-align:center;">Загрузка результатов...</p>';
    
    const result = await apiCall('get_results', {});
    
    console.log('API result:', result);
    
    if (!result.success || !result.data) {
        resultsContainer.innerHTML = '<p style="text-align:center;">Результаты недоступны. Возможно, вы ещё не прошли опрос.</p>';
        return;
    }
    
    const r = result.data;
    const totalRespondents = r.total_respondents || 1;
    const otherCount = r.other_respondents || 0;
    
    // Функция для форматирования значения (прочерк если undefined/null, но 0 оставляем)
    const fmt = (val) => (val === undefined || val === null || val === '') ? '—' : val;
    
    // Функция для форматирования процентов (0 заменяем на прочерк)
    const fmtPct = (val) => (val === undefined || val === null || val === '' || val === 0) ? '—' : val + '%';
    
    resultsContainer.innerHTML = `
        <div class="results-card">
            <h2>Ваши результаты</h2>
            <p class="results-summary">Всего в исследовании участвовало <strong>${totalRespondents}</strong> человек${otherCount > 0 ? ` (из них ${otherCount} уже завершили опрос)` : ''}.</p>
            <table class="results-table">
                <thead>
                    <tr>
                        <th rowspan="2">Шкала / Параметр</th>
                        <th rowspan="2">Ваше значение</th>
                        <th colspan="3">Процент респондентов</th>
                    </tr>
                    <tr>
                        <th>Ниже</th>
                        <th>Такой же</th>
                        <th>Выше</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><strong>Возраст</strong></td>
                        <td>${fmt(r.age)} лет</td>
                        <td class="col-below">${fmtPct(r.age_below_pct)}</td>
                        <td>${fmtPct(r.age_equal_pct)}</td>
                        <td class="col-above">${fmtPct(r.age_above_pct)}</td>
                    </tr>
                    <tr>
                        <td><strong>Прокрастинация</strong></td>
                        <td>${fmt(r.proc_total)} <span class="notes">(из 40)</span></td>
                        <td class="col-below">${fmtPct(r.proc_below_pct)}</td>
                        <td>${fmtPct(r.proc_equal_pct)}</td>
                        <td class="col-above">${fmtPct(r.proc_above_pct)}</td>
                    </tr>
                    <tr>
                        <td><strong>Удовлетворённость жизнью</strong></td>
                        <td>${fmt(r.swls_total)} <span class="notes">(из 35)</span></td>
                        <td class="col-below">${fmtPct(r.swls_below_pct)}</td>
                        <td>${fmtPct(r.swls_equal_pct)}</td>
                        <td class="col-above">${fmtPct(r.swls_above_pct)}</td>
                    </tr>
                    <tr>
                        <td><strong>Эмоциональное истощение</strong></td>
                        <td>${fmt(r.mbi_total)} <span class="notes">(из 54)</span></td>
                        <td class="col-below">${fmtPct(r.mbi_below_pct)}</td>
                        <td>${fmtPct(r.mbi_equal_pct)}</td>
                        <td class="col-above">${fmtPct(r.mbi_above_pct)}</td>
                    </tr>
                    <tr>
                        <td><strong>Энергия в красной зоне</strong></td>
                        <td>${fmt(r.cubes_reactive)}</td>
                        <td class="col-below">${fmtPct(r.cubes_reactive_below_pct)}</td>
                        <td>${fmtPct(r.cubes_reactive_equal_pct)}</td>
                        <td class="col-above">${fmtPct(r.cubes_reactive_above_pct)}</td>
                    </tr>
                    <tr>
                        <td><strong>Энергия в зелёной зоне</strong></td>
                        <td>${fmt(r.cubes_proactive)}</td>
                        <td class="col-below">${fmtPct(r.cubes_proactive_below_pct)}</td>
                        <td>${fmtPct(r.cubes_proactive_equal_pct)}</td>
                        <td class="col-above">${fmtPct(r.cubes_proactive_above_pct)}</td>
                    </tr>
                    <tr>
                        <td><strong>Энергия в серой зоне</strong></td>
                        <td>${fmt(r.cubes_operational)}</td>
                        <td class="col-below">${fmtPct(r.cubes_operational_below_pct)}</td>
                        <td>${fmtPct(r.cubes_operational_equal_pct)}</td>
                        <td class="col-above">${fmtPct(r.cubes_operational_above_pct)}</td>
                    </tr>
                    <tr>
                        <td><strong>Насколько типичная неделя</strong><br><span class="notes">(минус - хуже, плюс - лучше)</span></td>
                        <td>${fmt(r.representative)}</td>
                        <td class="col-below">${fmtPct(r.representative_below_pct)}</td>
                        <td>${fmtPct(r.representative_equal_pct)}</td>
                        <td class="col-above">${fmtPct(r.representative_above_pct)}</td>
                    </tr>
                    <tr>
                        <td><strong>Баланс работа/личная жизнь</strong><br><span class="notes">(минус - больше на личное, плюс - больше в работу)</span></td>
                        <td>${fmt(r.work_life)}</td>
                        <td class="col-below">${fmtPct(r.work_life_below_pct)}</td>
                        <td>${fmtPct(r.work_life_equal_pct)}</td>
                        <td class="col-above">${fmtPct(r.work_life_above_pct)}</td>
                    </tr>
                    <tr>
                        <td><strong>Дефицит энергии</strong><br><span class="notes">(минус - избыток, плюс - недостаток)</span></td>
                        <td>${fmt(r.energy_deficit)}</td>
                        <td class="col-below">${fmtPct(r.energy_deficit_below_pct)}</td>
                        <td>${fmtPct(r.energy_deficit_equal_pct)}</td>
                        <td class="col-above">${fmtPct(r.energy_deficit_above_pct)}</td>
                    </tr>
                    <tr>
                        <td><strong>Записи vs память</strong><br><span class="notes">(1 - всё по памяти, 5 - всё по записи)</span></td>
                        <td>${fmt(r.memory_vs_records)}</td>
                        <td class="col-below">${fmtPct(r.memory_vs_records_below_pct)}</td>
                        <td>${fmtPct(r.memory_vs_records_equal_pct)}</td>
                        <td class="col-above">${fmtPct(r.memory_vs_records_above_pct)}</td>
                    </tr>
                </tbody>
            </table>
            <p class="results-note">
                ${otherCount > 0 
                    ? `На основе данных ${otherCount} респондентов. В столбцах показан процент респондентов, у которых значение меньше, равно или больше вашего.` 
                    : 'Вы первый респондент! После накопления данных здесь появится статистика.'}
            </p>
        </div>
    `;
}

// Загружаем результаты при загрузке страницы
document.addEventListener('DOMContentLoaded', loadResults);
</script>
</body>
</html>
