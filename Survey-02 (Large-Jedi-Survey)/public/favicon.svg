<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Градиент для светового меча -->
    <linearGradient id="blade-gradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff00;stop-opacity:0.2"/>
      <stop offset="50%" style="stop-color:#00ff00;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1"/>
    </linearGradient>
    
    <!-- Свечение -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Фон - круг -->
  <circle cx="32" cy="32" r="30" fill="#1a1a2e"/>
  
  <!-- Рукоять светового меча -->
  <rect x="28" y="38" width="8" height="18" rx="2" fill="#8b8b8b"/>
  <rect x="26" y="40" width="12" height="4" rx="1" fill="#666"/>
  <rect x="26" y="50" width="12" height="4" rx="1" fill="#666"/>
  
  <!-- Лезвие светового меча -->
  <rect x="29" y="8" width="6" height="32" rx="3" fill="url(#blade-gradient)" filter="url(#glow)"/>
  
  <!-- Звезда силы (декоративный элемент) -->
  <circle cx="32" cy="10" r="3" fill="#ffffff" opacity="0.8"/>
</svg>
